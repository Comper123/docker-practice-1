version: "3.9"

services:
    db:
        image: postgres:15
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: shorter
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    app:
        build: ./app/link-shorter
        ports:
            - "5000:5000"
        environment:
            DATABASE_URL: postgres://postgres:postgres@db:5432/shorter
        depends_on:
            - db
volumes:
    postgres_data:
